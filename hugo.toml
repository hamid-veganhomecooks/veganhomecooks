baseURL = "https://veganhomecooks.online/"
languageCode = "en-us"
title = "Vegan Home Cooks"
theme = "hugo-cookbook"

[params]
description = "A community recipe book for vegan home cooks"
author = "Vegan Home Cooks Community"

[params.front]
defaultAuthor = "Vegan Home Cooks Community" #Put in the default name of the author of the recipe
defaultImage = "/images/defaultImage.png" #default image that will be used for a recipe with no image
defaultImageHeight = 512 #default recipe image height
defaultImageWidth = 512 # default recipe image width

[params.logo]
fileName = "/images/logo3.png"
height =  50
width = 500

[params.favicon]
fileName = "/images/favicon.png" #your favicon here if you wish to change it.

[menu]
  [[menu.main]]
    name = "Home"
    pre = "fas fa-home" #icon, change if you would prefer a different icon
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Categories" # change to w/e you want, tags or categories works best
    pre = "fas fa-tags" #icon, change if you would prefer a different icon
    url = "/tags/"
    weight = 2

# Print output just creates a special route for a print view
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "PRINT"]

# The settings for the print format
[outputFormats]
  [outputFormats.PRINT]
    name = "print"
    mediaType = "text/html"
    baseName = "print"
    isPlainText = false
    rel = "print"
    isHTML = true
    noUgly = true
    permalinkable = true
    path = "print"