baseURL = "https://veganhomecooks.online/"
languageCode = "en-us"
title = "Vegan Home Cooks"
theme = "hugo-cookbook"

[params]
description = "A community recipe book for vegan home cooks"
author = "Vegan Home Cooks Community"

[params.front]
defaultAuthor = "Vegan Home Cooks Community" #Put in the default name of the author of the recipe
defaultImage = "/images/defaultImage.png" #default image that will be used for a recipe with no image
defaultImageHeight = 512 #default recipe image height
defaultImageWidth = 512 # default recipe image width

[params.logo]
fileName = "/images/logo3.png"
height =  50
width = 500

# Print output just creates a special route for a print view
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML", "PRINT"]

# The settings for the print format
[outputFormats]
  [outputFormats.PRINT]
    name = "print"
    mediaType = "text/html"
    baseName = "print"
    isPlainText = false
    rel = "print"
    isHTML = true
    noUgly = true
    permalinkable = true
    path = "print"