<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ .Title }}</title>
  <style>
    body { font-family: Georgia, serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 2em; margin-bottom: 0; }
    .meta { color: #666; margin-bottom: 20px; }
    img { max-width: 300px; float: right; margin: 0 0 20px 20px; }
    @media print { img { max-width: 200px; } }
  </style>
</head>
<body>
  <h1>{{ .Title }}</h1>
  <div class="meta">By {{ .Params.author }}</div>
  {{ with .Params.recipe_image }}<img src="{{ . }}">{{ end }}
  {{ .Content }}
</body>
</html>
