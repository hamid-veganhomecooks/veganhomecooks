<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 90" width="480" height="90">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Lato:wght@300&amp;display=swap');
    </style>
  </defs>

  <!-- Main cursive title -->
  <text x="240" y="58"
        font-family="Great Vibes, Palatino Linotype, cursive"
        font-size="62"
        fill="white"
        text-anchor="middle"
        letter-spacing="2">Vegan Home Cooks</text>

  <!-- Thin decorative lines flanking a small leaf -->
  <line x1="60" y1="72" x2="210" y2="72" stroke="white" stroke-width="0.6" opacity="0.6"/>
  <line x1="270" y1="72" x2="420" y2="72" stroke="white" stroke-width="0.6" opacity="0.6"/>

  <!-- Small leaf in center between lines -->
  <g transform="translate(232, 64) scale(0.55)">
    <path d="M 8 0 C 8 0 22 -8 24 4 C 26 14 10 14 8 0 Z" fill="white" opacity="0.8"/>
    <path d="M 8 0 C 14 2 20 0 24 4" stroke="white" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
</svg>
